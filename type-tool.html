<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arena Type Tool — type & export</title>
<meta name="description" content="Type directly in the Arena display typeface and export vector SVG or high-resolution transparent PNG / JPG.">
<style>
  @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&display=swap");
  @font-face{font-family:"Arena";src:url("./assets/fonts/Arena-Regular.otf?v=62") format("opentype");font-weight:400 900;font-display:swap}
  :root{
    --yellow:#faff00;
    --f-arena:"Arena","Arial Narrow",sans-serif;--f-syne:"Syne",system-ui,sans-serif;
    --rule:rgba(255,255,255,.16);--muted:rgba(255,255,255,.55);
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{background:#000;color:#fff;font-family:var(--f-syne);overflow:hidden}

  /* the viewport IS the canvas you type into */
  .stage{position:fixed;inset:0;display:grid;place-items:center;background:#000;
         transition:background .3s var(--ease);cursor:text}
  .stage.light{background:#fff}
  .center{display:flex;flex-direction:column;align-items:center;gap:clamp(18px,3vh,34px);width:100%;padding-inline:clamp(24px,6vw,80px)}
  .typewrap{display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden}
  /* alignment: position the type block + ragged edge left / center / right */
  .stage.align-left  .center{align-items:flex-start}
  .stage.align-right .center{align-items:flex-end}
  .stage.align-left  .typewrap{justify-content:flex-start}
  .stage.align-right .typewrap{justify-content:flex-end}
  .stage.align-left  .type{text-align:left}
  .stage.align-right .type{text-align:right}
  /* download row that lives directly under the type the user has made */
  .dl-under{display:flex;align-items:center;gap:14px;min-height:42px;opacity:0;transform:translateY(8px);
            transition:opacity .3s var(--ease),transform .3s var(--ease);pointer-events:none}
  .dl-under.show{opacity:1;transform:none;pointer-events:auto}
  .dl-label{font-family:var(--f-syne);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .stage.light .dl-label{color:rgba(0,0,0,.5)}
  .stage.light .dl-under .dl button{color:#000;border-color:rgba(0,0,0,.2)}
  .type{display:inline-block;font-family:var(--f-arena);text-transform:uppercase;font-weight:400;line-height:.92;
        letter-spacing:-.01em;white-space:pre;text-align:center;color:#fff;outline:none;font-size:120px;
        caret-color:var(--yellow);transition:color .3s var(--ease)}
  .stage.light .type{color:#000;caret-color:#000}
  .te-caret{display:inline-block;width:3px;height:.72em;margin-left:.06em;background:var(--yellow);
            vertical-align:-.06em;animation:blink 1.05s steps(1) infinite}
  .stage.light .te-caret{background:#000}
  /* thin blinking hairline cursor when you click into the empty canvas
     (native caret hidden while empty so there's no double cursor) */
  .type:empty{caret-color:transparent}
  .type:empty:focus::after{content:"";display:inline-block;width:3px;height:.72em;
            background:var(--yellow);vertical-align:-.06em;animation:blink 1.05s steps(1) infinite}
  .stage.light .type:empty:focus::after{background:#000}
  @keyframes blink{50%{opacity:0}}

  /* clear "click to type" prompt — pulses, sits below the type, hides on focus */
  .cta{position:fixed;left:50%;bottom:24%;transform:translateX(-50%);z-index:4;display:inline-flex;align-items:center;gap:10px;
       font-family:var(--f-syne);font-weight:600;font-size:.8rem;letter-spacing:.04em;color:#000;background:var(--yellow);
       padding:11px 18px;border-radius:999px;box-shadow:0 0 0 0 rgba(250,255,0,.55);animation:ctapulse 2.1s var(--ease) infinite;
       pointer-events:none;transition:opacity .3s}
  .cta svg{width:16px;height:16px}
  .cta.hide{opacity:0}
  @keyframes ctapulse{0%{box-shadow:0 0 0 0 rgba(250,255,0,.5)}70%{box-shadow:0 0 0 16px rgba(250,255,0,0)}100%{box-shadow:0 0 0 0 rgba(250,255,0,0)}}

  /* controls */
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:5;display:flex;gap:clamp(1rem,4vw,2.5rem);align-items:center;justify-content:center;
       flex-wrap:wrap;padding:clamp(.7rem,2vw,1.1rem) clamp(1rem,3vw,2rem)}
  .ctl{display:flex;align-items:center;gap:9px}
  .ctl > span{font-family:var(--f-syne);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--rule);border-radius:999px;overflow:hidden;background:rgba(127,127,127,.14);backdrop-filter:blur(6px)}
  .seg button{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-syne);font-weight:600;font-size:.74rem;
              background:transparent;color:inherit;border:0;padding:9px 15px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--yellow);color:#000}
  .sw{width:14px;height:14px;border-radius:50%;border:1px solid rgba(127,127,127,.6)}
  .sw-black{background:#000}.sw-white{background:#fff}
  .seg button svg{display:block;width:15px;height:15px;fill:currentColor}
  /* per-pair kerning view: text becomes individual letters with adjustable gaps */
  .type .kline{display:block;white-space:pre}
  .type.kerning{cursor:default}
  .type.kerning .ch{display:inline-block;white-space:pre;position:relative}
  .type.kerning .ch[data-g]:not([data-g=""]){cursor:ew-resize}
  .type.kerning .ch.kactive::before{content:"";position:absolute;left:0;top:-7%;height:114%;width:2px;
       background:var(--yellow);transform:translateX(-50%);border-radius:2px}
  .stage.light .type.kerning .ch.kactive::before{background:#111}
  /* kern HUD — shows the active pair + value, with tighten/loosen */
  .khud{position:fixed;left:50%;bottom:20%;transform:translateX(-50%);z-index:4;display:none;align-items:center;gap:13px;
        font-family:var(--f-syne);background:rgba(18,18,18,.86);backdrop-filter:blur(8px);border:1px solid var(--rule);
        border-radius:999px;padding:8px 10px 8px 16px;color:#fff;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .khud.show{display:inline-flex}
  .stage.light ~ .khud{background:rgba(255,255,255,.92);border-color:rgba(0,0,0,.14);color:#111;box-shadow:0 8px 30px rgba(0,0,0,.12)}
  .khud__pair{font-weight:700;letter-spacing:.06em;font-size:.95rem}
  .khud__val{font-variant-numeric:tabular-nums;min-width:42px;text-align:center;font-size:.8rem;color:var(--yellow)}
  .stage.light ~ .khud .khud__val{color:#111}
  .khud__hint{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;opacity:.55;margin-left:2px}
  .kbtn{font-family:var(--f-syne);font-weight:700;font-size:1.05rem;line-height:1;background:transparent;border:1px solid var(--rule);
        color:inherit;border-radius:50%;width:28px;height:28px;cursor:pointer;transition:.15s;flex:none}
  .kbtn:hover{border-color:var(--yellow);color:var(--yellow)}
  .stage.light ~ .khud .kbtn{border-color:rgba(0,0,0,.2)}
  .stage.light ~ .khud .kbtn:hover{border-color:#111;color:#111}
  .dl{display:flex;gap:8px;flex-wrap:wrap}
  .dl button{font-family:var(--f-syne);font-weight:700;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;
             background:rgba(127,127,127,.14);backdrop-filter:blur(6px);color:inherit;border:1px solid var(--rule);border-radius:999px;padding:10px 16px;cursor:pointer;transition:.15s}
  .dl button:hover:not(:disabled){border-color:var(--yellow);color:var(--yellow)}
  .dl button:disabled{opacity:.4;cursor:not-allowed}
  /* dark text for controls on the white ground */
  .stage.light ~ .bar{color:#000}
  .stage.light ~ .bar .ctl>span{color:rgba(0,0,0,.5)}
  .stage.light ~ .bar .seg{border-color:rgba(0,0,0,.18)}
  .stage:not(.light) ~ .bar{color:#fff}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="center">
      <div class="typewrap"><div class="type" id="type" contenteditable="plaintext-only" spellcheck="false" role="textbox" aria-label="Type in the Arena typeface"></div></div>
      <div class="dl-under" id="dlunder">
        <span class="dl-label">Download</span>
        <div class="dl">
          <button id="dl-png" disabled>PNG</button>
          <button id="dl-svg" disabled>SVG</button>
          <button id="dl-jpg" disabled>JPG</button>
        </div>
      </div>
    </div>
  </div>

  <div class="cta" id="cta">Click anywhere &amp; start typing</div>

  <div class="bar">
    <div class="ctl">
      <span>Background</span>
      <div class="seg" id="mode" role="group" aria-label="Background color">
        <button data-mode="dark" class="on"><span class="sw sw-black"></span>Black</button>
        <button data-mode="light"><span class="sw sw-white"></span>White</button>
      </div>
    </div>
    <div class="ctl">
      <span>Align</span>
      <div class="seg" id="align" role="group" aria-label="Text alignment">
        <button data-align="left" aria-label="Align left"><svg viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="1.7"/><rect x="1" y="7.2" width="9" height="1.7"/><rect x="1" y="11.4" width="12" height="1.7"/></svg></button>
        <button data-align="center" class="on" aria-label="Align center"><svg viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="1.7"/><rect x="3.5" y="7.2" width="9" height="1.7"/><rect x="2" y="11.4" width="12" height="1.7"/></svg></button>
        <button data-align="right" aria-label="Align right"><svg viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="1.7"/><rect x="6" y="7.2" width="9" height="1.7"/><rect x="3" y="11.4" width="12" height="1.7"/></svg></button>
      </div>
    </div>
    <div class="ctl">
      <span>Kern</span>
      <div class="seg" id="kern" role="group" aria-label="Manual per-pair kerning">
        <button data-kern="off" class="on">Off</button>
        <button data-kern="on">On</button>
      </div>
    </div>
  </div>

  <div class="khud" id="khud">
    <button class="kbtn" id="ktight" aria-label="Tighten pair" title="Tighten (←)">&minus;</button>
    <span class="khud__pair" id="kpair">—</span>
    <span class="khud__val" id="kval">0</span>
    <button class="kbtn" id="kloose" aria-label="Loosen pair" title="Loosen (→)">+</button>
    <span class="khud__hint">← → kern · click / tab to move pair</span>
  </div>

  <script src="./assets/vendor/opentype.min.js"></script>
  <script>
  (function(){
    var stage=document.getElementById('stage'), type=document.getElementById('type'),
        wrap=type.parentNode, cta=document.getElementById('cta'), modeWrap=document.getElementById('mode'),
        alignWrap=document.getElementById('align'), dlunder=document.getElementById('dlunder');
    var kernWrap=document.getElementById('kern'),
        khud=document.getElementById('khud'), kpair=document.getElementById('kpair'), kval=document.getElementById('kval'),
        ktight=document.getElementById('ktight'), kloose=document.getElementById('kloose');
    var dlBtns=[document.getElementById('dl-svg'),document.getElementById('dl-png'),document.getElementById('dl-jpg')];
    var font=null, mode='dark', align='center', userActive=false, demoTimer=null;
    // manual = per-pair kern overrides keyed by left-char index; kernOn = manual-kern view
    var manual={}, kernOn=false, activeGap=null, lockedText='';
    var EM=1000, LINE=0.95, CAP=0.72, PAD=0.16, TARGET=3500, MAXPX=480, MINPX=22;

    function colors(){ return mode==='dark' ? {fg:'#ffffff', bg:'#000000'} : {fg:'#000000', bg:'#ffffff'}; }
    // in kern mode the type holds per-letter spans, so read from the locked snapshot instead
    function text(){ return kernOn ? lockedText : (type.innerText||''); }
    // downloads appear under the type only once the user has typed something
    function enableDownloads(){ var has=text().trim().length>0; dlBtns.forEach(function(b){b.disabled=!has;}); dlunder.classList.toggle('show', has && userActive); }
    function esc(s){ return s.replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

    /* ---- auto-fit: huge for short text, shrinks as you type ---- */
    function fit(){
      if(!text().trim()){ type.style.fontSize='200px'; return; } // moderate caret size when empty
      // virtual fit area (decoupled from the wrap, so the wrap stays content-sized and the group centers)
      var availW=stage.clientWidth*0.86, availH=stage.clientHeight*0.46;
      type.style.fontSize='100px';
      var w=type.scrollWidth||1, h=type.scrollHeight||1;
      var size=Math.min(availW/w, availH/h)*100;
      size=Math.max(MINPX, Math.min(size, MAXPX));
      type.style.fontSize=size+'px';
    }

    /* ---- idle "type to invite" demo ---- */
    var phrases=["ENTER\nTHE ARENA","WHERE STORIES\nARE FORGED","STORIES THAT\nHIT HARD","CLAIM\nYOUR SEAT"];
    var pi=0, ci=0, deleting=false;
    function demo(){
      if(userActive) return;
      var p=phrases[pi];
      type.innerHTML = esc(p.slice(0,ci)) + '<span class="te-caret"></span>';
      fit();
      // type each sentence smoothly (line return included); the pause lives
      // between sentences — a ~2s hold once the full phrase is shown.
      if(!deleting){ ci++; if(ci>p.length){ deleting=true; demoTimer=setTimeout(demo,1500); return; } }
      else { ci--; if(ci<0){ deleting=false; ci=0; pi=(pi+1)%phrases.length; demoTimer=setTimeout(demo,1500); return; } }
      demoTimer=setTimeout(demo, deleting?50:115);
    }
    function stopDemo(){ if(demoTimer){clearTimeout(demoTimer);demoTimer=null;} }
    function goLive(){ if(userActive) return; userActive=true; stopDemo(); type.innerHTML=''; cta.classList.add('hide'); fit(); enableDownloads(); }
    function idle(){ userActive=false; ci=0; deleting=false; cta.classList.remove('hide'); enableDownloads(); demo(); }

    /* ---- kerning model (shared by the on-screen view and the export) ----
       Total gap between two letters = font's own kern + any manual per-pair
       override. manual is keyed by the LEFT letter's absolute index in the
       (uppercased) text, so the screen and the export stay in sync. */
    function fontKern(a,b){ if(!font) return 0; try{ return (font.getKerningValue(font.charToGlyph(a), font.charToGlyph(b))||0); }catch(e){ return 0; } }
    function kernUnits(a,b,gi){ return fontKern(a,b) + (manual[gi]||0); }
    function gapKeys(){ var keys=[], lines=lockedText.split('\n'), pos=0; for(var i=0;i<lines.length;i++){ for(var j=0;j<lines[i].length-1;j++) keys.push(pos+j); pos+=lines[i].length+1; } return keys; }

    /* ---- vector geometry / export (true outlines via opentype) ----
       Lay out glyph-by-glyph so manual kerns bake into the export. */
    function geometry(){
      if(!font) return null;
      var raw=text().toUpperCase().replace(/\r/g,''), lines=raw.split('\n');
      var absStarts=[], pos=0, i, j;
      for(i=0;i<lines.length;i++){ absStarts.push(pos); pos+=lines[i].length+1; }
      function lineW(ln,abs){ var w=0; for(var k=0;k<ln.length;k++){ w+=font.getAdvanceWidth(ln[k],EM); if(k<ln.length-1) w+=kernUnits(ln[k],ln[k+1],abs+k); } return w; }
      var widths=lines.map(function(ln,i){ return lineW(ln,absStarts[i]); });
      var maxW=Math.max.apply(null, widths.concat([1]));
      var parts=[], minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9, ink=false;
      for(i=0;i<lines.length;i++){
        var off = align==='left' ? 0 : (align==='right' ? (maxW-widths[i]) : (maxW-widths[i])/2);
        var baseline=i*EM*LINE; minY=Math.min(minY,baseline-EM*CAP); maxY=Math.max(maxY,baseline);
        var penX=off, ln=lines[i];
        for(j=0;j<ln.length;j++){
          var gp=font.getPath(ln[j],penX,baseline,EM), d=gp.toPathData(2);
          if(d){ parts.push(d); ink=true; var bb=gp.getBoundingBox();
            if(isFinite(bb.x1)){minX=Math.min(minX,bb.x1);maxX=Math.max(maxX,bb.x2);minY=Math.min(minY,bb.y1);maxY=Math.max(maxY,bb.y2);} }
          penX += font.getAdvanceWidth(ln[j],EM);
          if(j<ln.length-1) penX += kernUnits(ln[j],ln[j+1],absStarts[i]+j);
        }
      }
      if(!ink) return null;
      var pad=EM*PAD; minX-=pad;maxX+=pad;minY-=pad;maxY+=pad;
      return {d:parts.join(' '), x:minX, y:minY, w:maxX-minX, h:maxY-minY};
    }

    /* ---- manual-kern view: render the locked text as individual letters with
       per-gap margins (font kern re-added since splitting into spans drops it) ---- */
    function renderKern(){
      var lines=lockedText.split('\n'), pos=0, html='';
      for(var i=0;i<lines.length;i++){ var ln=lines[i]; html+='<div class="kline">';
        for(var j=0;j<ln.length;j++){
          var key=pos+j-1, m=0, dg='';
          if(j>0){ m=kernUnits(ln[j-1],ln[j],key)/EM; dg=String(key); }
          var act=(j>0 && activeGap===key)?' kactive':'';
          html+='<span class="ch'+act+'" data-g="'+dg+'" style="margin-left:'+m.toFixed(4)+'em">'+esc(ln[j])+'</span>';
        }
        html+='</div>'; pos+=ln.length+1;
      }
      type.innerHTML=html; fit(); updateHud();
    }
    function updateHud(){
      if(!kernOn || activeGap==null){ khud.classList.remove('show'); return; }
      var l=lockedText[activeGap]||'', r=lockedText[activeGap+1]||'';
      kpair.textContent=l+' '+r; var v=manual[activeGap]||0; kval.textContent=(v>0?'+':'')+v;
      khud.classList.add('show');
    }
    function nudge(d){ if(activeGap==null) return; manual[activeGap]=(manual[activeGap]||0)+d; renderKern(); }
    function moveGap(dir){ var k=gapKeys(); if(!k.length) return; var idx=k.indexOf(activeGap); idx=Math.max(0,Math.min(k.length-1,(idx<0?0:idx)+dir)); activeGap=k[idx]; renderKern(); }
    function setKern(on){
      if(on){
        if(!userActive || !text().trim()) return;            // need real typed text first
        lockedText=(type.innerText||'').toUpperCase().replace(/\r/g,'');
        kernOn=true; stopDemo(); cta.classList.add('hide');
        type.setAttribute('contenteditable','false'); type.classList.add('kerning'); type.style.letterSpacing='0';
        var k=gapKeys(); activeGap=k.length?k[0]:null; renderKern(); type.focus(); enableDownloads();
      } else {
        kernOn=false; type.setAttribute('contenteditable','plaintext-only'); type.classList.remove('kerning');
        type.innerText=lockedText; khud.classList.remove('show'); fit();
      }
      [].forEach.call(kernWrap.children,function(b){ b.classList.toggle('on', b.dataset.kern===(on?'on':'off')); });
    }
    function svgStr(g,fg,bg){ var rect=bg?'<rect x="'+g.x+'" y="'+g.y+'" width="'+g.w+'" height="'+g.h+'" fill="'+bg+'"/>':'';
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="'+g.x.toFixed(1)+' '+g.y.toFixed(1)+' '+g.w.toFixed(1)+' '+g.h.toFixed(1)+'" width="'+Math.round(g.w)+'" height="'+Math.round(g.h)+'">'+rect+'<path d="'+g.d+'" fill="'+fg+'"/></svg>'; }
    function download(blob,name){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(a.href);},1500); }
    function slug(){ var s=text().toUpperCase().replace(/\s+/g,'-').replace(/[^A-Z0-9\-]/g,'').slice(0,40); return 'arena-'+(s||'type'); }
    function exportSVG(){ var g=geometry(); if(!g)return; download(new Blob([svgStr(g,colors().fg,null)],{type:'image/svg+xml'}), slug()+'.svg'); }
    function raster(mime,quality,fill){ var g=geometry(); if(!g)return; var c=colors();
      var scale=TARGET/Math.max(g.w,g.h), cw=Math.max(1,Math.round(g.w*scale)), ch=Math.max(1,Math.round(g.h*scale));
      var canvas=document.createElement('canvas'); canvas.width=cw; canvas.height=ch; var ctx=canvas.getContext('2d');
      if(fill){ ctx.fillStyle=fill; ctx.fillRect(0,0,cw,ch); }
      var img=new Image(); img.onload=function(){ ctx.drawImage(img,0,0,cw,ch); canvas.toBlob(function(b){ if(b) download(b, slug()+(mime==='image/png'?'.png':'.jpg')); }, mime, quality); };
      img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr(g,c.fg,null)); }

    /* ---- wire ---- */
    stage.addEventListener('mousedown', function(e){ if(e.target!==type){ e.preventDefault(); type.focus(); } });
    type.addEventListener('focus', goLive);
    // editing the text changes which pairs exist, so manual kerns reset
    type.addEventListener('input', function(){ userActive=true; cta.classList.add('hide'); manual={}; activeGap=null; fit(); enableDownloads(); });
    type.addEventListener('blur', function(){ if(!kernOn && !text().trim()){ idle(); } });
    window.addEventListener('resize', fit);
    modeWrap.addEventListener('click', function(e){ var b=e.target.closest('button'); if(!b)return; mode=b.dataset.mode;
      stage.classList.toggle('light', mode==='light'); [].forEach.call(modeWrap.children,function(x){x.classList.toggle('on',x===b);}); });
    alignWrap.addEventListener('click', function(e){ var b=e.target.closest('button'); if(!b)return; align=b.dataset.align;
      stage.classList.remove('align-left','align-center','align-right'); stage.classList.add('align-'+align);
      [].forEach.call(alignWrap.children,function(x){x.classList.toggle('on',x===b);}); fit(); });
    // manual per-pair kerning
    kernWrap.addEventListener('click', function(e){ var b=e.target.closest('button'); if(!b)return; setKern(b.dataset.kern==='on'); });
    type.addEventListener('click', function(e){ if(!kernOn) return; var s=e.target.closest('.ch'); if(s && s.dataset.g!==''){ activeGap=parseInt(s.dataset.g,10); renderKern(); } });
    ktight.addEventListener('click', function(){ nudge(-5); });
    kloose.addEventListener('click', function(){ nudge(5); });
    document.addEventListener('keydown', function(e){
      if(!kernOn) return;
      if(e.key==='ArrowLeft'){ e.preventDefault(); nudge(e.shiftKey?-20:-5); }
      else if(e.key==='ArrowRight'){ e.preventDefault(); nudge(e.shiftKey?20:5); }
      else if(e.key==='Tab'){ e.preventDefault(); moveGap(e.shiftKey?-1:1); }
      else if(e.key==='Escape'){ setKern(false); }
    });
    document.getElementById('dl-svg').addEventListener('click', exportSVG);
    document.getElementById('dl-png').addEventListener('click', function(){ raster('image/png', undefined, null); });
