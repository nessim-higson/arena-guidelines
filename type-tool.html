<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arena Type Tool — typeset & export</title>
<meta name="description" content="Typeset in the Arena display typeface and export vector SVG or high-resolution transparent PNG / JPG.">
<style>
  @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&display=swap");
  @font-face{font-family:"Arena";src:url("./assets/fonts/Arena-Regular.otf") format("opentype");font-weight:400 900;font-display:swap}
  :root{
    --black:#000;--white:#fff;--yellow:#faff00;
    --f-arena:"Arena","Arial Narrow",sans-serif;--f-syne:"Syne",system-ui,sans-serif;
    --rule:rgba(255,255,255,.14);--muted:rgba(255,255,255,.6);
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{background:#000;color:#fff;font-family:var(--f-syne);display:flex;flex-direction:column;min-height:100%}
  .top{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;flex-wrap:wrap;
       padding:clamp(.9rem,2vw,1.4rem) clamp(1rem,3vw,2rem);border-bottom:1px solid var(--rule)}
  .top h1{font-family:var(--f-arena);text-transform:uppercase;font-weight:400;font-size:clamp(1rem,2.4vw,1.5rem);letter-spacing:.02em}
  .top p{font-size:.74rem;color:var(--muted);max-width:60ch}

  /* preview stage */
  .stage{flex:1;min-height:42vh;display:grid;place-items:center;padding:clamp(1.5rem,5vw,4rem);
         background:#000;transition:background .25s var(--ease);overflow:hidden}
  .stage.light{background:#fff}
  .stage svg{max-width:100%;max-height:100%;width:auto;height:auto;display:block}
  .empty{font-family:var(--f-syne);color:var(--muted);font-size:.9rem}

  /* controls */
  .controls{border-top:1px solid var(--rule);padding:clamp(.9rem,2.5vw,1.6rem) clamp(1rem,3vw,2rem);
            display:grid;grid-template-columns:1fr auto;gap:clamp(1rem,3vw,2rem);align-items:end}
  @media(max-width:760px){.controls{grid-template-columns:1fr}}
  label.fld{display:block;font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px}
  textarea{width:100%;min-height:64px;resize:vertical;background:#0c0c0c;color:#fff;border:1px solid var(--rule);
           border-radius:10px;padding:12px 14px;font-family:var(--f-syne);font-size:1rem;line-height:1.3;outline:none}
  textarea:focus{border-color:var(--yellow)}
  .right{display:flex;flex-direction:column;gap:14px;align-items:flex-start}
  .seg{display:inline-flex;border:1px solid var(--rule);border-radius:999px;overflow:hidden}
  .seg button{font-family:var(--f-syne);font-weight:600;font-size:.72rem;letter-spacing:.04em;background:transparent;color:var(--muted);
              border:0;padding:9px 15px;cursor:pointer;transition:.15s}
  .seg button.on{background:#fff;color:#000}
  .dl{display:flex;gap:8px;flex-wrap:wrap}
  .dl button{font-family:var(--f-syne);font-weight:700;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;
             background:transparent;color:#fff;border:1px solid var(--rule);border-radius:999px;padding:10px 16px;cursor:pointer;transition:.15s}
  .dl button:hover{border-color:var(--yellow);color:var(--yellow)}
  .dl button:disabled{opacity:.4;cursor:not-allowed}
  .note{font-size:.66rem;color:var(--muted)}
  .err{color:var(--yellow)}
</style>
</head>
<body>
  <header class="top">
    <div>
      <h1>Arena Type Tool</h1>
      <p>Typeset in the Arena display face, set it black or white, and export. SVG is true vector; PNG &amp; JPG export at ~3500&nbsp;px so titles stay crisp in slides.</p>
    </div>
    <p class="note" id="status">Loading font…</p>
  </header>

  <div class="stage" id="stage"><span class="empty" id="empty">…</span></div>

  <div class="controls">
    <div>
      <label class="fld" for="txt">Your text — Arena is uppercase &amp; display-only</label>
      <textarea id="txt" spellcheck="false" placeholder="ENTER THE ARENA">ENTER THE ARENA</textarea>
    </div>
    <div class="right">
      <div class="seg" id="mode" role="group" aria-label="Color">
        <button data-mode="dark" class="on">White on black</button>
        <button data-mode="light">Black on white</button>
      </div>
      <div class="dl">
        <button id="dl-svg" disabled>SVG</button>
        <button id="dl-png" disabled>PNG</button>
        <button id="dl-jpg" disabled>JPG</button>
      </div>
      <div class="note" id="dims">—</div>
    </div>
  </div>

  <script src="./assets/vendor/opentype.min.js"></script>
  <script>
  (function(){
    var stage=document.getElementById('stage'), empty=document.getElementById('empty'),
        txt=document.getElementById('txt'), status=document.getElementById('status'),
        dims=document.getElementById('dims'), modeWrap=document.getElementById('mode');
    var dlBtns=[document.getElementById('dl-svg'),document.getElementById('dl-png'),document.getElementById('dl-jpg')];
    var font=null, mode='dark';
    var EM=1000, LINE=0.95, CAP=0.72, PAD=0.16, TARGET=3500;

    function colors(){ return mode==='dark' ? {fg:'#ffffff', bg:'#000000'} : {fg:'#000000', bg:'#ffffff'}; }

    function geometry(){
      if(!font) return null;
      var text=(txt.value||'').toUpperCase().replace(/\r/g,'');
      var lines=text.split('\n');
      var parts=[], minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9, ink=false;
      for(var i=0;i<lines.length;i++){
        var baseline=i*EM*LINE;
        minY=Math.min(minY, baseline-EM*CAP); maxY=Math.max(maxY, baseline);
        var p=font.getPath(lines[i], 0, baseline, EM);
        var d=p.toPathData(2);
        if(d){ parts.push(d); ink=true;
          var bb=p.getBoundingBox();
          if(isFinite(bb.x1)){ minX=Math.min(minX,bb.x1);maxX=Math.max(maxX,bb.x2);minY=Math.min(minY,bb.y1);maxY=Math.max(maxY,bb.y2); }
        }
      }
      if(!ink){ return null; }
      var pad=EM*PAD;                       // fixed padding (fraction of one em), not of width
      minX-=pad;maxX+=pad;minY-=pad;maxY+=pad;
      return {d:parts.join(' '), x:minX, y:minY, w:maxX-minX, h:maxY-minY};
    }

    function svgStr(g, fg, bg){
      var rect = bg ? '<rect x="'+g.x+'" y="'+g.y+'" width="'+g.w+'" height="'+g.h+'" fill="'+bg+'"/>' : '';
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="'+g.x.toFixed(1)+' '+g.y.toFixed(1)+' '+g.w.toFixed(1)+' '+g.h.toFixed(1)+'" '+
             'width="'+Math.round(g.w)+'" height="'+Math.round(g.h)+'">'+rect+'<path d="'+g.d+'" fill="'+fg+'"/></svg>';
    }

    function render(){
      var g=geometry(), c=colors();
      stage.classList.toggle('light', mode==='light');
      var ok=!!g;
      dlBtns.forEach(function(b){b.disabled=!ok;});
      if(!ok){ stage.innerHTML='<span class="empty">Type something…</span>'; dims.textContent='—'; return; }
      stage.innerHTML=svgStr(g, c.fg, null);
      dims.textContent='Vector · exports ~3500 px raster';
    }

    function download(blob, name){
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name;
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(a.href);},1500);
    }
    function slug(){ var s=(txt.value||'arena').toUpperCase().replace(/\s+/g,'-').replace(/[^A-Z0-9\-]/g,'').slice(0,40); return 'arena-'+(s||'type'); }

    function exportSVG(){
      var g=geometry(); if(!g) return; var c=colors();
      download(new Blob([svgStr(g, c.fg, null)], {type:'image/svg+xml'}), slug()+'.svg');
    }
    function raster(mime, quality, fill){
      var g=geometry(); if(!g) return; var c=colors();
      var scale=TARGET/Math.max(g.w,g.h);
      var cw=Math.max(1,Math.round(g.w*scale)), ch=Math.max(1,Math.round(g.h*scale));
      var canvas=document.createElement('canvas'); canvas.width=cw; canvas.height=ch;
      var ctx=canvas.getContext('2d');
      if(fill){ ctx.fillStyle=fill; ctx.fillRect(0,0,cw,ch); }
      var img=new Image();
      img.onload=function(){
        ctx.drawImage(img,0,0,cw,ch);
        canvas.toBlob(function(b){ if(b) download(b, slug()+(mime==='image/png'?'.png':'.jpg')); }, mime, quality);
      };
      img.onerror=function(){ status.textContent='Export failed.'; };
      img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr(g, c.fg, null));
    }

    // wire
    txt.addEventListener('input', render);
    modeWrap.addEventListener('click', function(e){
      var b=e.target.closest('button'); if(!b) return;
      mode=b.dataset.mode;
      [].forEach.call(modeWrap.children, function(x){x.classList.toggle('on', x===b);});
      render();
    });
    document.getElementById('dl-svg').addEventListener('click', exportSVG);
    document.getElementById('dl-png').addEventListener('click', function(){ raster('image/png', undefined, null); });
    document.getElementById('dl-jpg').addEventListener('click', function(){ raster('image/jpeg', 0.95, colors().bg); });

    // load font
    opentype.load('./assets/fonts/Arena-Regular.otf', function(err, f){
      if(err){ status.innerHTML='<span class="err">Could not load the Arena font.</span>'; empty.textContent='Font failed to load.'; return; }
      font=f; status.textContent='Ready'; render();
    });
  })();
  </script>
</body>
</html>
